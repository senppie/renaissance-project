<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();

  // Slideshow logic
  let currentPage = 0;
  const pages = document.querySelectorAll('.page');
  const totalPages = pages.length;
  let isScrolling = false;
  const scrollCooldown = 700;
  let musicPaused = false;

  // Music toggle 
  const musicToggleBtn = document.getElementById('music-toggle-btn');
  if (musicToggleBtn) {
    musicToggleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      musicPaused = !musicPaused;
      console.log('Music paused state:', musicPaused);
      updateMusicButtonState();

      const audioElements = document.querySelectorAll('.page-audio');
      if (musicPaused) {
        audioElements.forEach(audio => {
          audio.pause();
          console.log('Pausing audio');
        });
      } else {
        audioElements[currentPage].play().catch(err => console.log('Audio play failed:', err));
      }
    });
  }

  function updateMusicButtonState() {
    if (musicPaused) {
      musicToggleBtn.innerHTML = '<i data-lucide="play" class="w-6 h-6"></i>';
    } else {
      musicToggleBtn.innerHTML = '<i data-lucide="pause" class="w-6 h-6"></i>';
    }
    lucide.createIcons();
  }

  // Seamless audio looping - immediately restart when audio ends
  document.querySelectorAll('.page-audio').forEach((audio, index) => {
    audio.addEventListener('ended', function () {
      if (currentPage === index && !musicPaused) {
        audio.play().catch(err => console.log('Audio play failed:', err));
      }
    }, false);
  });

  function goToPage(index) {
    currentPage = (index + totalPages) % totalPages;

    pages.forEach((page, i) => {
      const offset = (i - currentPage) * 100;
      page.style.transform = `translateY(${offset}%)`;
      if (i === currentPage) {
        page.classList.add('active');
      } else {
        page.classList.remove('active');
      }
    });

    // Audio loop handling
    const audioElements = document.querySelectorAll('.page-audio');
    audioElements.forEach((audio, i) => {
      if (i === currentPage) {
        audio.currentTime = 0;
        if (!musicPaused) {
          audio.play().catch(err => console.log('Audio play failed:', err));
        }
      } else {
        audio.pause();
        audio.currentTime = 0;
      }
    });

    // Update pagination dots
    document.querySelectorAll('.pagination-dot').forEach((dot, i) => {
      if (i === currentPage) {
        dot.classList.add('active');
      } else {
        dot.classList.remove('active');
      }
    });
  }

  // Pagination dot clicks
  document.querySelectorAll('.pagination-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      if (isScrolling) return;
      const pageIndex = parseInt(dot.dataset.page);
      isScrolling = true;
      goToPage(pageIndex);
      setTimeout(() => {
        isScrolling = false;
      }, scrollCooldown);
    });
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (isScrolling) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      isScrolling = true;
      goToPage(currentPage + 1);
      setTimeout(() => {
        isScrolling = false;
      }, scrollCooldown);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      isScrolling = true;
      goToPage(currentPage - 1);
      setTimeout(() => {
        isScrolling = false;
      }, scrollCooldown);
    }
  });

  // Mouse scroll navigation
  let scrollAccumulator = 0;
  const scrollThreshold = 50;

  document.addEventListener('wheel', (e) => {
    if (isScrolling) return;
    e.preventDefault();

    scrollAccumulator += e.deltaY;

    if (Math.abs(scrollAccumulator) >= scrollThreshold) {
      isScrolling = true;
      if (scrollAccumulator > 0) {
        goToPage(currentPage + 1);
      } else {
        goToPage(currentPage - 1);
      }
      scrollAccumulator = 0;
      setTimeout(() => {
        isScrolling = false;
      }, scrollCooldown);
    }
  }, { passive: false });

  // Initialize first page
  goToPage(0);
</script>
