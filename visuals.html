<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>act i RENAISSANCE: VISUALS</title>
  <link rel="icon" type="image/png" href="assets/favicon-main.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @font-face {
        font-family: 'BBManualMono';
        src: url('assets/font/BBManualMonoPro-Regular.otf') format('opentype');
        font-weight: 400;
      }

      @layer base {
        body {
          font-family: 'BBManualMono', monospace;
        }
      }

      @layer components {
        .page {
          @apply absolute inset-0 w-full h-screen flex flex-col items-center justify-center gap-6 p-8 transition-transform duration-700 ease-in-out;
        }

        .pagination-dot {
          @apply w-3 h-3 rounded-full transition-all cursor-pointer;
        }

        .pagination-dot.active {
          @apply bg-white;
        }

        .pagination-dot:not(.active) {
          @apply bg-white/10;
        }
      }
  </style>
</head>
<body class="bg-black text-white select-none overflow-hidden h-screen">
  <div class="fixed top-8 left-1/2 -translate-x-1/2 z-50">
    <nav class="flex gap-2 bg-zinc-700/20 px-2 py-1 text-xl border-2 border-zinc-700/60 backdrop-blur-md rounded-2xl">
      <a href="tracks.html" class="px-4 py-2 text-white/40 hover:text-white transition">MUSIC</a>
      <a href="visuals.html" class="px-4 py-2 text-white transition">VISUALS</a>
      <a href="#" class="px-4 py-2 text-white/40 hover:text-white transition">TOUR</a>
      <a href="#" class="px-4 py-2 text-white/40 hover:text-white transition">SHOP</a>
      <a href="#" class="px-4 py-2 text-white/40 hover:text-white transition">ABOUT</a>
    </nav>
  </div>
  <div class="fixed top-9 left-55 z-50">
    <a href="index.html" class="inline-flex items-center gap-2 bg-zinc-700/20 px-4 py-2 text-white/40 hover:text-white text-xl border-2 border-zinc-700/60 rounded-2xl">
      <i data-lucide="house" class="w-5 h-5"></i>
        HOME
    </a>
  </div>

  <!-- Slideshow Container -->
  <div id="slideshow" class="relative w-full h-screen overflow-hidden">
    <!-- Page 1 -->
   <div class="page">
      <h1 class="text-5xl">Page 1</h1>
      <p class="text-2xl text-white/40">Add your content here</p>
    </div>

    <!-- Page 2 -->
    <div class="page">
      <h1 class="text-5xl">Page 2</h1>
      <p class="text-2xl text-white/40">Add your content here</p>
    </div>

    <!-- Page 3 -->
    <div class="page">
      <h1 class="text-5xl">Page 3</h1>
      <p class="text-2xl text-white/40">Add your content here</p>
    </div>

    <!-- Page 4 -->
    <div class="page">
      <h1 class="text-5xl">Page 4</h1>
      <p class="text-2xl text-white/40">Add your content here</p>
    </div>
  </div>
  <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex gap-2">
    <button class="pagination-dot" data-page="0"></button>
    <button class="pagination-dot" data-page="1"></button>
    <button class="pagination-dot" data-page="2"></button>
    <button class="pagination-dot" data-page="3"></button>
  </div>
</body>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();

  // Slideshow
  let currentPage = 0;
  const pages = document.querySelectorAll('.page');
  const totalPages = pages.length;
  let isScrolling = false;
  const scrollCooldown = 700;

  function goToPage(index) {
    currentPage = (index + totalPages) % totalPages;
    
    // Move all pages
    pages.forEach((page, i) => {
      const offset = (i - currentPage) * 100;
      page.style.transform = `translateY(${offset}%)`;
    });

    // Update pagination dots
    document.querySelectorAll('.pagination-dot').forEach((dot, i) => {
      if (i === currentPage) {
        dot.classList.add('active');
      } else {
        dot.classList.remove('active');
      }
    });
  }

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (isScrolling) return;
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      isScrolling = true;
      goToPage(currentPage + 1);
      setTimeout(() => {
        isScrolling = false;
      }, scrollCooldown);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      isScrolling = true;
      goToPage(currentPage - 1);
      setTimeout(() => {
        isScrolling = false;
      }, scrollCooldown);
    }
  });

  // Pagination dot clicks
  document.querySelectorAll('.pagination-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      if (isScrolling) return;
      const pageIndex = parseInt(dot.dataset.page);
      isScrolling = true;
      goToPage(pageIndex);
      setTimeout(() => {
        isScrolling = false;
      }, scrollCooldown);
    });
  });

  // Initialize first page
  goToPage(0);
</script>
</html>
