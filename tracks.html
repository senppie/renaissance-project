  <script>
    const tracks = [
      { title: "I'M THAT GIRL", duration: "3:28" },
      { title: "COZY", duration: "3:30" },
      { title: "ALIEN SUPERSTAR", duration: "3:35" },
      { title: "CUFF IT", duration: "3:45" },
      { title: "ENERGY (FEAT. BEAM)", duration: "1:56" },
      { title: "BREAK MY SOUL", duration: "4:38" },
      { title: "CHURCH GIRL", duration: "3:44" },
      { title: "PLASTIC OFF THE SOFA", duration: "4:14" },
      { title: "VIRGO'S GROOVE", duration: "6:08" },
      { title: "MOVE (FEAT. GRACE JONES & TEMS)", duration: "3:23" },
      { title: "HEATED", duration: "4:20" },
      { title: "THIQUE", duration: "4:04" },
      { title: "ALL UP IN YOUR MIND", duration: "2:29" },
      { title: "AMERICA HAS A PROBLEM", duration: "3:18" },
      { title: "PURE/HONEY", duration: "4:48" },
      { title: "SUMMER RENAISSANCE", duration: "4:34" }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.querySelector('#songlist');

      tracks.forEach((track, index) => {
        const trackDiv = document.createElement('div');
        trackDiv.className = 'inline-flex items-baseline justify-between gap-20 z-0';
        trackDiv.innerHTML = `
        <div class="inline-flex items-baseline gap-8">
          <p class="text-white/40 w-6">${index + 1}</p>
          <p class="text-white">${track.title}</p>
        </div>
        <p class="text-white/40">${track.duration}</p>
      `;
        container.appendChild(trackDiv);
      });
    });
  </script>
